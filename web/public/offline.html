<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · OSRS Sidekick</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #0d0d0d;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      .mark {
        width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 20px;
        display: grid; place-items: center; font-size: 30px;
        background: linear-gradient(135deg, #e6b84a, #c98500); color: #1a1305;
      }
      h1 { font-size: 20px; margin: 0 0 8px; letter-spacing: -0.02em; }
      p { color: #898781; font-size: 14px; max-width: 320px; margin: 0 auto 20px; line-height: 1.5; }
      button {
        font: inherit; font-weight: 600; cursor: pointer;
        background: linear-gradient(135deg, #e6b84a, #c98500); color: #1a1305;
        border: none; border-radius: 10px; padding: 10px 20px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark">⚔</div>
      <h1>You're offline</h1>
      <p>OSRS Sidekick needs a connection to load your live stats. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
