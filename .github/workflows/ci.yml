name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `build` compiles every module and runs the full test suite (the live-API
      # integration tests skip themselves when no API key is present, so CI needs no secrets).
      - name: Build and test
        run: ./gradlew build --stacktrace --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            plugin/build/reports/tests/test
          if-no-files-found: ignore
